post:
  tags:
    - Conversion API
  summary: Create Pixel type Conversion.
  description: This api is used to create a pixel type conversion.
  operationId: addPixelConversion
  parameters:
    - name: Authorization
      in: header
      description: Authorization Bearer Token
      example: Bearer token
    - name: X-IAA-OW-ID
      in: header
      description: Organization Workspace Id Header
      example: 1
  requestBody:
    content:
      application/json:
        schema:
          required:
            - conversionSetting
            - name
          type: object
          properties:
            id:
              type: integer
              format: int32
              description: a description of attribute
            name:
              maxLength: 255
              minLength: 0
              type: string
            uuid:
              type: string
              description: Universal user ID
            typeId:
              type: integer
              format: int32
            owId:
              type: integer
              format: int32
            createdByUowId:
              type: integer
              format: int32
            modifiedByUowId:
              type: integer
              format: int32
            statusId:
              type: integer
              format: int32
            status:
              type: string
            created:
              type: integer
              format: int64
            attributionId:
              type: integer
              format: int32
            customFields:
              type: array
              items:
                type: string
            financialMetrics:
              type: string
            piggybackData:
              type: object
              properties:
                url:
                  type: string
                  description: Piggyback URL
                type:
                  type: integer
                  format: int32
                  description: another description
            pixelConversionScript:
              type: string
            conversionSetting:
              required:
                - conversionDuration
                - repeatConversion
              type: object
              properties:
                conversionDuration:
                  type: object
                  properties:
                    view:
                      maximum: 30
                      minimum: 1
                      type: integer
                      format: int32
                    click:
                      maximum: 60
                      minimum: 7
                      type: integer
                      format: int32
                repeatConversion:
                  required:
                    - count
                    - frequency
                    - unit
                  type: object
                  properties:
                    count:
                      type: integer
                      format: int32
                    frequency:
                      type: integer
                      format: int32
                    unit:
                      type: string
                crossModelling:
                  type: boolean
        examples:
          RequestBody for Adding Pixel Conversion:
            description: RequestBody for Adding Pixel Conversion
            value:
              name: PixelConversion
              attributionId: '1'
              customFields:
                - field_1
                - field_2
                - field_3
              financialMetrics: field_4
              piggybackData:
                url: 'http:/piggybackdata.com/url'
                type: 1
              conversionSetting:
                conversionDuration:
                  view: 10
                  click: 10
                repeatConversion:
                  count: 1
                  frequency: 1
                  unit: Day
                crossModelling: true
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          example:
            success: true
            data:
              id: 3213
              name: PixelConversion
              postbackPartnerName: null
              status: Pending
              type: Pixel
              created: 1687459918
              totalConversions: 0
              owId: 202017
              createdByUowId: 108658
              modifiedByUowId: 108658
              uuid: a574ca49cc244c3bb3089491a11aae43
              attributedConversions: 0
              attributedViewThroughConversions: 0
              attributedClickThroughConversions: 0
              pixelFinancialMetric: name
              postbackPartnerLogoURL: null
              pixelConversionScript: >-
                <script
                src='https:/pxl.stage.iqm.com/i/pixel/8f3165d0-b714-440e-bc1d-621127fa5fad?cv={CONVERSION_VALUE}'
                async></script>
              partnerUrl: null
    '403':
      description: Forbidden
      content:
        application/json:
          example:
            success: false
            errorObjects:
              - error: Forbidden!
    '500':
      description: Internal server error
      content:
        application/json:
          example:
            success: false
            errorObjects:
              - error: server encountered an error !
